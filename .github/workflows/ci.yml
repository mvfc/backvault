name: CI
permissions:
  contents: read
  pull-requests: write
  packages: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system dependencies
        run: apt-get update && apt-get install -y libsqlcipher-dev
        
      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff check
        run: uv run ruff check

      - name: Run ruff format check
        run: uv run ruff format --check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libsqlite3-dev libsqlcipher-dev libssl-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Run pytest
        run: uv run pytest -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always() && (success() || failure())
        with:
          name: coverage
          path: coverage.xml
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  docker-build:
    name: Docker Build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set platform slug
        id: platform-slug
        run: |
          PLATFORM="${{ matrix.platform }}"
          echo "slug=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          platforms: ${{ matrix.platform }}
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.platform-slug.outputs.slug }}-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Bitwarden CLI
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            ${{ env.IMAGE_NAME }}:${{ steps.platform-slug.outputs.slug }}-test \
            bw --version

      - name: Verify supercronic
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            ${{ env.IMAGE_NAME }}:${{ steps.platform-slug.outputs.slug }}-test \
            supercronic --version

      - name: Verify Python
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            ${{ env.IMAGE_NAME }}:${{ steps.platform-slug.outputs.slug }}-test \
            python3 --version

      - name: Verify entrypoint is executable
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            ${{ env.IMAGE_NAME }}:${{ steps.platform-slug.outputs.slug }}-test \
            test -x /app/entrypoint.sh

      - name: Verify run script is executable
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            ${{ env.IMAGE_NAME }}:${{ steps.platform-slug.outputs.slug }}-test \
            test -x /app/run.sh

      - name: Verify required directories exist
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            ${{ env.IMAGE_NAME }}:${{ steps.platform-slug.outputs.slug }}-test \
            test -d /app/backups && test -d /app/db && test -d /app/logs

  docker-push:
    name: Docker Push
    needs: [docker-build, lint, unit-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max