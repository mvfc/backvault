name: E2E Tests
permissions:
  contents: read
  actions: read

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  pull_request:
    paths:
      - 'tests/**'
      - '.github/workflows/e2e.yml'
      - 'src/**'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}
  VAULTWARDEN_URL: http://localhost:8080

jobs:
  e2e:
    name: E2E Tests
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          platforms: linux/amd64
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:e2e-test
            backvault:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start Vaultwarden
        run: |
          docker run -d \
            --name backvault-e2e-vaultwarden \
            -p 8080:80 \
            -e SIGNUPS_ALLOWED=true \
            -e ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }} \
            vaultwarden/server:latest

      - name: Wait for Vaultwarden to start
        run: |
          echo "Waiting for Vaultwarden..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Vaultwarden is ready"
              break
            fi
            echo "Attempt $i/30: Waiting..."
            sleep 2
          done

      - name: Verify Vaultwarden is running
        run: |
          curl -sf http://localhost:8080/health || exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlcipher-dev

      - name: Install Bitwarden CLI
        run: |
          npm install -g @bitwarden/cli

      - name: Configure Bitwarden CLI
        run: |
          bw config server ${{ env.VAULTWARDEN_URL }}

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --dev

      - name: Run E2E tests
        env:
          VAULTWARDEN_URL: ${{ env.VAULTWARDEN_URL }}
          BW_TEST_EMAIL: ${{ secrets.BW_TEST_EMAIL }}
          BW_TEST_PASSWORD: ${{ secrets.BW_TEST_PASSWORD }}
          BW_TEST_MASTER_PASSWORD: ${{ secrets.BW_TEST_MASTER_PASSWORD }}
        run: uv run pytest tests/test_e2e.py -v --timeout=300

      - name: Cleanup Vaultwarden
        if: always()
        run: |
          docker stop backvault-e2e-vaultwarden || true
          docker rm backvault-e2e-vaultwarden || true

      - name: Cleanup Docker buildx
        if: always()
        run: |
          docker buildx prune --all || true