name: E2E Tests
permissions:
  contents: read
  actions: read

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  pull_request:
    paths:
      - 'tests/**'
      - '.github/workflows/e2e.yml'
      - 'src/**'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}
  VAULTWARDEN_PORT: '8089'
  VAULTWARDEN_URL: http://localhost:8089

jobs:
  e2e:
    name: E2E Tests
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            --tag "${{ env.IMAGE_NAME }}:e2e-test" \
            --tag backvault:latest \
            .

      - name: Start Vaultwarden
        run: |
          docker rm -f backvault-e2e-vaultwarden 2>/dev/null || true
          docker run -d \
            --name backvault-e2e-vaultwarden \
            -p "${{ env.VAULTWARDEN_PORT }}:80" \
            -e SIGNUPS_ALLOWED=true \
            -e ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }} \
            -e I_REALLY_WANT_VOLATILE_STORAGE=true \
            vaultwarden/server:latest
          VW_IP=$(docker inspect backvault-e2e-vaultwarden --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -so /dev/null -w '%{http_code}' -L "http://${VW_IP}:80/api/config" 2>/dev/null)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Vaultwarden is ready (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i/30: Waiting... (HTTP $HTTP_CODE)"
            sleep 2
          done
          HTTP_CODE=$(curl -so /dev/null -w '%{http_code}' -L "http://${VW_IP}:80/api/config" 2>/dev/null)
          echo "Error: Vaultwarden failed to start (HTTP $HTTP_CODE)"
          docker logs backvault-e2e-vaultwarden
          docker stop backvault-e2e-vaultwarden 2>/dev/null || true
          docker rm backvault-e2e-vaultwarden 2>/dev/null || true
          exit 1

      - name: Verify Vaultwarden is running
        run: |
          VW_IP=$(docker inspect backvault-e2e-vaultwarden --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
          HTTP_CODE=$(curl -so /dev/null -w '%{http_code}' -L "http://${VW_IP}:80/api/config" 2>/dev/null)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: Vaultwarden health check failed (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libsqlcipher-dev libssl-dev

      - name: Install Bitwarden CLI
        run: |
          npm install -g @bitwarden/cli

      - name: Configure Bitwarden CLI
        run: |
          bw config server ${{ env.VAULTWARDEN_URL }}

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --dev

      - name: Run E2E tests
        env:
          VAULTWARDEN_URL: ${{ env.VAULTWARDEN_URL }}
          BW_TEST_EMAIL: ${{ secrets.BW_TEST_EMAIL }}
          BW_TEST_PASSWORD: ${{ secrets.BW_TEST_PASSWORD }}
          BW_TEST_MASTER_PASSWORD: ${{ secrets.BW_TEST_MASTER_PASSWORD }}
        run: uv run pytest tests/test_e2e.py -v --timeout=300

      - name: Cleanup Vaultwarden
        if: always()
        run: |
          docker stop backvault-e2e-vaultwarden 2>/dev/null || true
          docker rm backvault-e2e-vaultwarden 2>/dev/null || true

      - name: Cleanup Docker buildx
        if: always()
        run: |
          docker buildx prune --all -f 2>/dev/null || true